name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_VERSION=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via webhook (primary)
        id: webhook
        run: |
          HTTP_CODE=$(curl -s -o /tmp/deploy-response.txt -w '%{http_code}' \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            "http://${{ secrets.VPS_HOST }}:9443/deploy")
          echo "HTTP response code: $HTTP_CODE"
          cat /tmp/deploy-response.txt
          if [ "$HTTP_CODE" != "202" ]; then
            echo "::warning::Webhook deploy failed with HTTP $HTTP_CODE, will try SSH fallback"
            exit 1
          fi
          echo "Deploy triggered successfully via webhook"

      - name: Deploy via SSH (fallback)
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 30s
          command_timeout: 10m
          script: |
            cd /home/postiz/app
            bash scripts/deploy.sh
